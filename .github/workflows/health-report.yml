name: Meridian CPD — Daily Health Report

on:
  schedule:
    # 07:20 UTC every day (after content engine on 1st/15th)
    - cron: '20 7 * * *'
  workflow_dispatch:

jobs:
  health-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx supabase resend

      - name: Run health report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_TO_EMAIL: mattid272@gmail.com
        run: python3 .github/scripts/health_report.py
